<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLink Reparto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .contenedor { background: white; width: 100%; max-width: 380px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #eee; }
        
        .btn-azar { background: #6f42c1; color: white; border: none; width: 100%; padding: 12px; border-radius: 50px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 0.85em; width: 100%; }
        #victima { color: #fdd835; text-transform: uppercase; margin-left: 5px; }

        .header-logo { background-color: #ff3333; padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px; text-align: center; }
        .logo-texto { font-size: 22px; font-weight: bold; }
        .pantalla-dinero { font-size: 2.8em; font-weight: bold; margin: 5px 0; }
        .fondo-txt { font-size: 0.85em; opacity: 0.9; }

        .seccion { margin-bottom: 20px; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .titulo-seccion { font-size: 0.8em; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; }

        input { width: 100%; padding: 12px; font-size: 1.1em; border: 2px solid #eaedf0; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box; text-align: center; outline: none; }
        
        .btn { display: block; width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 0.95em; font-weight: 600; color: white; cursor: pointer; margin-top: 5px; }
        .bg-ingresos { border-left: 5px solid #47c96d; background: #f6fff9; }
        .bg-gastos { border-left: 5px solid #ff5e5e; background: #fff6f6; }
        
        .btn-verde { background: #47c96d; }
        .btn-rojo { background: #ff5e5e; }
        .btn-azul { background: #4a90e2; }
        .btn-negro { background: #333; width: 100%; margin-top: 10px; }
        .btn-reiniciar { background: none; border: 1px solid #ccc; color: #999; width: 100%; margin-top: 25px; font-size: 0.75em; padding: 8px; border-radius: 10px; cursor: pointer; }

        #historial { text-align: left; margin-top: 15px; font-size: 0.85em; max-height: 120px; overflow-y: auto; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
        #modalMemoria { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; color: white; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .dia-registro { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #47c96d; }
    </style>
</head>
<body>

<div class="contenedor">
    <button class="btn-azar" onclick="mostrarVictima()">
        Hoy hay que joder a: <span id="victima">¿Quién toca?</span>
    </button>

    <div class="header-logo">
        <div class="logo-texto">FoodLink <small style="font-size: 10px;">GL</small></div>
        <div class="pantalla-dinero" id="display">$0.00</div>
        <div class="fondo-txt">Mi Fondo: <span id="txtFondo">$0.00</span></div>
    </div>

    <div class="seccion bg-ingresos">
        <div class="titulo-seccion" id="labelIngreso">Paso 1: Dinero Inicial</div>
        <input type="number" id="montoIngreso" placeholder="Escribe tu fondo" inputmode="decimal">
        <button class="btn btn-azul" id="btnFondo" onclick="setFondo()">FIJAR FONDO</button>
        <div id="controlesIngreso" style="display:none; gap: 5px; width: 100%;">
            <button class="btn btn-verde" style="flex:2" onclick="registrarIngreso('PEDIDO')">PEDIDO</button>
            <button class="btn btn-azul" style="flex:1" onclick="registrarIngreso('PROPINA')">PROPINA</button>
        </div>
    </div>

    <div class="seccion bg-gastos">
        <div class="titulo-seccion">Egresos</div>
        <input type="number" id="montoGasto" placeholder="$ Cantidad" inputmode="decimal" style="margin-bottom: 5px;">
        <input type="text" id="conceptoGasto" placeholder="Gasolina, comida, etc...">
        <button class="btn btn-rojo" onclick="registrarGasto()">REGISTRAR GASTO</button>
    </div>

    <div id="historial">
        <b>Movimientos:</b>
        <div id="log"></div>
    </div>

    <button class="btn btn-negro" onclick="verMemoria()">📂 CORTE HISTÓRICO</button>
    <button class="btn-reiniciar" onclick="reiniciarTurno()">Reiniciar Pantalla (Mantiene Historial)</button>
</div>

<div id="modalMemoria">
    <h2 style="color: #47c96d;">Resumen Diario</h2>
    <div id="listaDias"></div>
    <button class="btn btn-rojo" onclick="document.getElementById('modalMemoria').style.display='none'">CERRAR</button>
</div>

<script>
    let f = 0, g = 0, c = 0;
    const listaGente = ["Warache", "Pickles", "Alicia", "Jocsan", "Yovani", "Moi", "Jesús", "Josué"];

    window.onload = function() {
        cargarMovimientosHoy();
        document.getElementById('victima').innerText = calcularVictimaDelDia();
    };

    function calcularVictimaDelDia() {
        const hoy = new Date();
        const semilla = hoy.getFullYear() * 10000 + (hoy.getMonth() + 1) * 100 + hoy.getDate();
        const x = Math.sin(semilla) * 10000;
        const indice = Math.floor((x - Math.floor(x)) * listaGente.length);
        return listaGente[indice];
    }

    function mostrarVictima() {
        alert("¡No wey! Hoy toca joder todo el día a " + calcularVictimaDelDia());
    }

    function setFondo() {
        const val = document.getElementById('montoIngreso').value;
        if (val === "") { alert("Escribe tu fondo"); return; }
        f = parseFloat(val);
        // Guardamos el fondo en una llave especial de "sesión actual"
        localStorage.setItem('fondoActual', f);
        actualizarUI();
        document.getElementById('montoIngreso').value = "";
    }

    function registrarIngreso(tipo) {
        const val = document.getElementById('montoIngreso').value;
        if (val === "") { alert("Escribe el monto"); return; }
        const v = parseFloat(val);
        let label = tipo;
        if (tipo === 'PEDIDO') { c++; label = "Pedido #" + c; }
        g += v;
        guardarYLog(label, v);
        document.getElementById('montoIngreso').value = "";
        actualizarUI();
    }

    function registrarGasto() {
        const val = document.getElementById('montoGasto').value;
        const concepto = document.getElementById('conceptoGasto').value || "Gasto";
        if (val === "") { alert("Escribe el monto del gasto"); return; }
        const v = parseFloat(val);
        g -= v;
        guardarYLog("GASTO", -v, concepto);
        document.getElementById('montoGasto').value = "";
        document.getElementById('conceptoGasto').value = "";
        actualizarUI();
    }

    function actualizarUI() {
        document.getElementById('display').innerText = "$" + (f + g).toFixed(2);
        document.getElementById('txtFondo').innerText = "$" + f.toFixed(2);
        const btnF = document.getElementById('btnFondo');
        const ctrlI = document.getElementById('controlesIngreso');
        const lbl = document.getElementById('labelIngreso');
        const inp = document.getElementById('montoIngreso');

        if (f !== 0) {
            btnF.style.display = 'none';
            ctrlI.style.display = 'flex';
            lbl.innerText = "Ganancias (Pedido #" + (c + 1) + ")";
            inp.placeholder = "Monto ganado";
        } else {
            btnF.style.display = 'block';
            ctrlI.style.display = 'none';
            lbl.innerText = "Paso 1: Dinero Inicial";
            inp.placeholder = "Escribe tu fondo";
        }
    }

    function guardarYLog(tipo, valor, extra = "") {
        const hoy = new Date().toLocaleDateString("es-MX");
        let datos = JSON.parse(localStorage.getItem('memoriaFoodLink')) || [];
        datos.push({ fecha: hoy, tipo: tipo, monto: valor, concepto: extra });
        localStorage.setItem('memoriaFoodLink', JSON.stringify(datos));
        
        let n = document.createElement('div');
        n.innerText = `• ${tipo}${extra ? ': '+extra : ''} | $${valor.toFixed(2)}`;
        document.getElementById('log').prepend(n);
    }

    function cargarMovimientosHoy() {
        const datos = JSON.parse(localStorage.getItem('memoriaFoodLink')) || [];
        const hoy = new Date().toLocaleDateString("es-MX");
        const log = document.getElementById('log');
        log.innerHTML = "";
        g = 0; c = 0;
        
        // Recuperar fondo guardado
        const fondoGuardado = localStorage.getItem('fondoActual');
        if (fondoGuardado) f = parseFloat(fondoGuardado);

        datos.filter(d => d.fecha === hoy).forEach(d => {
            g += d.monto;
            if (d.tipo.includes("Pedido")) c++;
            let n = document.createElement('div');
            n.innerText = `• ${d.tipo}${d.concepto ? ': '+d.concepto : ''} | $${d.monto.toFixed(2)}`;
            log.prepend(n);
        });
        actualizarUI();
    }

    function reiniciarTurno() {
        if(confirm("¿Limpiar pantalla? Esto borrará el fondo actual de la vista.")) {
            f = 0; g = 0; c = 0;
            localStorage.removeItem('fondoActual');
            document.getElementById('log').innerHTML = "";
            actualizarUI();
        }
    }

    function verMemoria() {
        const datos = JSON.parse(localStorage.getItem('memoriaFoodLink')) || [];
        const lista = document.getElementById('listaDias');
        lista.innerHTML = "";
        const resumen = {};
        datos.forEach(d => {
            resumen[d.fecha] = (resumen[d.fecha] || 0) + d.monto;
        });
        Object.keys(resumen).reverse().forEach(fecha => {
            lista.innerHTML += `<div class="dia-registro"><b>${fecha}</b><br><span style="color:#47c96d">$${resumen[fecha].toFixed(2)}</span></div>`;
        });
        document.getElementById('modalMemoria').style.display = 'block';
    }
</script>

</body>
</html>
