<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Pro - FoodLink GL</title>
    <style>
        :root { --red: #ff3333; --dark: #050505; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 12px; background: #000; border-bottom: 2px solid var(--red); text-align: center; flex-shrink: 0; }
        .logo { font-weight: 900; font-size: 22px; } .l-r { color: var(--red); }
        #chat-box { flex: 1; padding: 15px 15px 145px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--red); }
        .user { align-self: flex-end; background: var(--red); color: white; }
        
        /* TABLA DE TARIFAS CORREGIDA */
        .t-wrap { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #333; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: #000; }
        td { border: 1px solid #222; padding: 6px; text-align: left; }
        .p { color: var(--red); font-weight: bold; text-align: right; }
        .h-t { background: #1a1a1a; font-weight: bold; color: var(--red); text-align: center; }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(10,10,10,0.98); border-top: 1px solid #222; z-index: 1000; }
        .input-row { display: flex; gap: 6px; background: #181818; padding: 5px; border-radius: 30px; border: 1px solid #333; max-width: 750px; margin: 0 auto; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; min-width: 0; }
        .btn-action { border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-panic { background: #ffcc00; color: black; font-size: 18px; }
        .btn-mic { background: #333; color: white; font-size: 18px; }
        .btn-mic.recording { background: var(--red); animation: pulse 1.5s infinite; }
        .btn-send { background: var(--red); color: white; font-size: 20px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 51, 51, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); } 100% { box-shadow: 0 0 0 0px rgba(255, 51, 51, 0); } }
    </style>
</head>
<body>

<header><div class="logo"><span class="l-r">Food</span>Link GL</div></header>

<div id="chat-box">
    <div class="msg ai">Hola. Soy la IA de FoodLink GL creada por **L.E.F.C.** ¿En qué te ayudo hoy?</div>
</div>

<div class="footer">
    <div class="input-row">
        <button class="btn-action btn-panic" onclick="panicButton()">🚨</button>
        <button id="mic-btn" class="btn-action btn-mic" onclick="toggleMic()">🎤</button>
        <input type="text" id="prompt" placeholder="Habla o escribe..." autocomplete="off">
        <button class="btn-action btn-send" onclick="ask()">➔</button>
    </div>
</div>

<script>
    const KEY = "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";
    const TARIFAS_HTML = `<div class="t-wrap"><table>
        <tr><td colspan="2" class="h-t">TARIFAS OFICIALES 2026</td></tr>
        <tr><td>0 a 2.0 KM</td><td class="p">$35</td></tr>
        <tr><td>2.1 a 4.0 KM</td><td class="p">$40</td></tr>
        <tr><td>4.1 a 6.0 KM</td><td class="p">$45</td></tr>
        <tr><td>6.1 a 7.0 KM</td><td class="p">$50</td></tr>
        <tr><td>7.1 a 8.0 KM</td><td class="p">$55</td></tr>
        <tr><td>8.1 a 9.0 KM</td><td class="p">$60</td></tr>
        <tr><td>9.1 a 11.0 KM</td><td class="p">$65</td></tr>
        <tr><td>11.1 a 13.0 KM</td><td class="p">$70</td></tr>
        <tr><td>13.1 en adelante</td><td class="p">$75</td></tr>
        <tr><td colspan="2" class="h-t">CARGOS EXTRA</td></tr>
        <tr><td>Lluvia / Compras / Foráneo</td><td class="p">+$10</td></tr>
        <tr><td>Espera (luego de 10 min)</td><td class="p">$1 por min</td></tr>
        <tr><td>Cancelación (en sitio)</td><td class="p">$20</td></tr>
    </table></div>`;

    let memoria = [{ role: "system", content: "Eres la IA de FoodLink GL. Creador: L.E.F.C. Hoy: 11 Abril 2026. Respuestas amables y MUY CORTAS. Si mencionas costos, usa la tabla." }];

    function panicButton() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const msg = encodeURIComponent(`🚨 ¡EMERGENCIA FOODLINK GL! 🚨\nApoyo aquí: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }, () => alert("Activa el GPS."));
    }

    let recognition;
    if (window.webkitSpeechRecognition || window.SpeechRecognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        recognition.onstart = () => document.getElementById('mic-btn').classList.add('recording');
        recognition.onend = () => document.getElementById('mic-btn').classList.remove('recording');
        recognition.onresult = (e) => { document.getElementById('prompt').value = e.results[0][0].transcript; ask(); };
    }
    function toggleMic() { if(recognition) recognition.start(); }

    async function ask() {
        const inp = document.getElementById('prompt');
        const txt = inp.value.trim();
        if(!txt) return;
        addMsg(txt, 'user');
        memoria.push({ role: "user", content: txt });
        inp.value = "";
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KEY}` },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: memoria, temperature: 0.4 })
            });
            const data = await res.json();
            let r = data.choices[0].message.content;
            if(r.toLowerCase().includes("tarifa") || r.includes("$")) r += TARIFAS_HTML;
            addMsg(r, 'ai');
            memoria.push({ role: "assistant", content: r });
        } catch (e) { addMsg("Error de red.", 'ai'); }
    }

    function addMsg(t, c) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerHTML = t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        b.appendChild(d);
        setTimeout(() => { b.scrollTo({ top: b.scrollHeight, behavior: 'smooth' }); }, 150);
    }
    document.getElementById('prompt').addEventListener('keypress', e => { if(e.key === 'Enter') ask(); });
</script>
</body>
</html>
