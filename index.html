<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLink GL - Pro</title>
    <style>
        :root { --rojo: #ff3333; --verde: #47c96d; --azul: #4a90e2; --bg: #f4f7f6; --card: #ffffff; --txt: #333; --border: #eee; --ws: #25D366; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; --border: #333; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--txt); margin: 0; padding: 5px; display: flex; justify-content: center; transition: 0.3s; }
        .contenedor { width: 100%; max-width: 360px; border-radius: 15px; padding: 12px; background: var(--card); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 80px; }
        
        .header-caja { background-color: var(--rojo); padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .logo-rayo { font-size: 24px; color: white; font-weight: bold; transform: skewX(-10deg); }
        .logo-texto { font-size: 22px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; }
        .logo-gl { font-size: 10px; align-self: flex-end; margin-bottom: 4px; border: 1px solid white; padding: 0 2px; border-radius: 2px; margin-left: 4px; }
        .logo-chispas { font-size: 18px; color: white; margin-left: 2px; }

        .pantalla-dinero { font-size: 2.5em; font-weight: bold; margin: 5px 0; }
        .txt-fondo { font-size: 0.85em; opacity: 0.9; }
        .txt-inicio-fijo { font-size: 0.7em; opacity: 0.8; margin-top: 2px; }

        .meta-container { margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; height: 16px; position: relative; overflow: hidden; }
        .barra-progreso { background: var(--verde); height: 100%; width: 0%; transition: 0.5s; }
        .txt-meta { position: absolute; width: 100%; text-align: center; font-size: 0.65em; font-weight: bold; line-height: 16px; color: white; }

        .btn-float { position: fixed; bottom: 20px; width: 55px; height: 55px; border-radius: 50%; border: none; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; }
        .btn-theme { left: 20px; background: var(--txt); color: var(--bg); width: 45px; height: 45px; font-size: 20px; }
        .btn-gps { right: 20px; background: var(--azul); color: white; }

        .seccion { margin-top: 10px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .bg-ingresos { border-left: 4px solid var(--verde); background: rgba(71, 201, 109, 0.05); }
        .bg-gastos { border-left: 4px solid var(--rojo); background: rgba(255, 51, 51, 0.05); }
        .titulo-s { font-size: 0.75em; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }

        input { width: 100%; padding: 10px; font-size: 1em; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; box-sizing: border-box; text-align: center; background: var(--card); color: var(--txt); }
        
        .grid-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 0.9em; }
        .btn-azul { background: var(--azul); }
        .btn-verde { background: var(--verde); }
        .btn-rojo { background: var(--rojo); }
        .btn-sos { background: #000; color: var(--rojo); border: 2px solid var(--rojo); width: 100%; margin: 12px 0; font-size: 1em; font-weight: 900; }
        
        .btn-whats { background: var(--ws); width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }

        #log-hoy { margin-top: 15px; font-size: 0.85em; max-height: 150px; overflow-y: auto; }
        .item-log { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .admin-btns { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<button class="btn-float btn-theme" onclick="toggleTheme()">🌓</button>
<button class="btn-float btn-gps" id="btn-gps" onclick="dictarGPS()">🗺️</button>

<div class="contenedor">
    <div class="header-caja">
        <div class="logo-container">
            <span class="logo-rayo" style="color: white;">⚡</span>
            <span class="logo-texto">FoodLink</span>
            <span class="logo-chispas">✨</span>
            <span class="logo-gl">GL</span>
        </div>
        
        <div class="pantalla-dinero" id="total-pantalla">$0.00</div>
        <div class="txt-fondo">Dinero en Bolsa</div>
        <div class="txt-inicio-fijo" id="fondo-inicio-html">Iniciaste con: $0.00</div>
        
        <div class="meta-container">
            <div class="barra-progreso" id="barra"></div>
            <div class="txt-meta" id="txt-meta">Ganancia: $0.00</div>
        </div>
    </div>

    <button class="btn btn-sos" onclick="enviarAuxilio()">⚠️ SOS EMERGENCIA</button>

    <div class="seccion bg-ingresos">
        <div class="titulo-s">Registrar Ingreso</div>
        <input type="number" id="input-monto" placeholder="Monto $" inputmode="decimal">
        
        <div class="grid-btns">
            <button class="btn btn-azul" onclick="sumar('PEDIDO')">SUMAR PEDIDO</button>
            <button class="btn btn-verde" style="background:#25D366;" onclick="sumar('PROPINA')">PROPINA</button>
        </div>
    </div>

    <div class="seccion bg-gastos">
        <div class="titulo-s">Gastos</div>
        <input type="number" id="input-gasto" placeholder="$" inputmode="decimal">
        <input type="text" id="input-nota" placeholder="¿En qué?">
        <button class="btn btn-rojo" style="width:100%" onclick="restar()">REGISTRAR GASTO</button>
    </div>

    <div id="log-hoy"></div>

    <button class="btn btn-whats" onclick="irAWhats()">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.407 3.481 2.241 2.242 3.477 5.23 3.474 8.411-.003 6.557-5.338 11.892-11.893 11.892-1.942-.001-3.841-.485-5.53-1.407l-6.538 1.723zm5.924-4.504c1.6.953 3.401 1.458 5.242 1.459 5.454 0 9.892-4.438 9.895-9.894.002-2.642-1.028-5.127-2.9-6.998s-4.355-2.903-6.998-2.903c-5.453 0-9.891 4.439-9.894 9.896-.001 1.884.516 3.722 1.493 5.309l-1.082 3.953 4.044-1.066z"/></svg>
        REGRESAR A WHATSAPP
    </button>

    <div class="admin-btns">
        <button class="btn" style="background:#333; width:100%; margin-bottom:8px;" onclick="mostrarHistorial()">📂 RESUMEN DE GANANCIAS</button>
        <button style="width:100%; background:none; color:var(--rojo); border:none; font-size:0.7em; cursor:pointer;" onclick="limpiarHoy()">🗑️ REINICIAR TURNO</button>
    </div>
</div>

<script>
    let movimientosTotal = 0, contadorPedidos = 0, metaDiaria = 1000, fondoInicialHoy = 0;

    window.onload = () => {
        if(localStorage.getItem('dark-mode') === 'true') document.body.classList.add('dark-mode');
        
        const hoy = new Date().toLocaleDateString('es-MX');
        let datos = JSON.parse(localStorage.getItem('foodlink_datos')) || [];
        let fondoExistente = datos.find(d => d.fecha === hoy && d.desc === "FONDO INICIAL");

        if (!fondoExistente) {
            let inicio = prompt("¿Con cuánto de fondo inicias?", "0");
            let montoInicio = parseFloat(inicio);
            if (isNaN(montoInicio)) montoInicio = 0;
            guardarMov("FONDO INICIAL", montoInicio);
            fondoInicialHoy = montoInicio;
        } else {
            fondoInicialHoy = fondoExistente.cantidad;
        }
        
        document.getElementById('fondo-inicio-html').innerText = `Iniciaste con: $${fondoInicialHoy.toFixed(2)}`;
        cargarMemoria();
    };

    function irAWhats() {
        // Enlace optimizado para abrir la App directamente sin errores de chat
        window.location.href = "whatsapp://app";
    }

    function dictarGPS() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-MX';
        const btn = document.getElementById('btn-gps');
        recognition.onstart = () => { btn.style.background = "red"; btn.innerText = "👂"; };
        recognition.onresult = (event) => {
            const direccion = event.results[0][0].transcript;
            btn.style.background = "var(--azul)"; btn.innerText = "🗺️";
            window.location.href = `https://www.google.com/maps/search/${encodeURIComponent(direccion)}`;
        };
        recognition.onerror = () => { btn.style.background = "var(--azul)"; btn.innerText = "🗺️"; };
        recognition.start();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
    }

    function sumar(tipo) {
        let val = parseFloat(document.getElementById('input-monto').value);
        if (!val || val <= 0) return alert("Ingresa monto");
        let nombre = tipo === 'PEDIDO' ? "Ped #" + (++contadorPedidos) : "Propina";
        guardarMov(nombre, val);
        document.getElementById('input-monto').value = "";
        cargarMemoria();
    }

    function restar() {
        let val = parseFloat(document.getElementById('input-gasto').value) || 0;
        let nota = document.getElementById('input-nota').value || "Gasto";
        if (val <= 0) return alert("Ingresa monto");
        guardarMov("Gasto: " + nota, -val);
        document.getElementById('input-gasto').value = "";
        document.getElementById('input-nota').value = "";
        cargarMemoria();
    }

    function guardarMov(tipo, monto) {
        const hoy = new Date().toLocaleDateString('es-MX');
        const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let datos = JSON.parse(localStorage.getItem('foodlink_datos')) || [];
        datos.push({ fecha: hoy, desc: tipo, cantidad: monto, hora: hora });
        localStorage.setItem('foodlink_datos', JSON.stringify(datos));
    }

    function cargarMemoria() {
        let datos = JSON.parse(localStorage.getItem('foodlink_datos')) || [];
        const hoy = new Date().toLocaleDateString('es-MX');
        let sumaTotal = 0, gananciasHoy = 0; contadorPedidos = 0;
        const logHtml = document.getElementById('log-hoy');
        logHtml.innerHTML = "";
        
        datos.filter(d => d.fecha === hoy).forEach(d => {
            sumaTotal += d.cantidad;
            if (d.desc.includes("Ped #") || d.desc === "Propina") {
                gananciasHoy += d.cantidad;
                if (d.desc.includes("Ped #")) contadorPedidos++;
            }
            let item = document.createElement('div');
            item.className = "item-log";
            item.innerHTML = `<div><b>${d.desc}</b> <span style="font-size:0.8em;color:#888">${d.hora}</span></div><b style="color:${d.cantidad < 0 ? 'red':'green'}">$${d.cantidad.toFixed(2)}</b>`;
            logHtml.prepend(item);
        });
        
        movimientosTotal = sumaTotal;
        actualizarUI(gananciasHoy);
    }

    function actualizarUI(gananciasHoy) {
        document.getElementById('total-pantalla').innerText = "$" + movimientosTotal.toFixed(2);
        let porcentaje = (gananciasHoy / metaDiaria) * 100;
        document.getElementById('barra').style.width = Math.min(porcentaje, 100) + "%";
        document.getElementById('txt-meta').innerText = `Ganancia: $${gananciasHoy.toFixed(2)}`;
    }

    function enviarAuxilio() {
        navigator.geolocation.getCurrentPosition(pos => {
            const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent('¡SOS! Ubicación: ' + url)}`;
        }, () => alert("Activa el GPS"));
    }

    function mostrarHistorial() {
        let datos = JSON.parse(localStorage.getItem('foodlink_datos')) || [];
        let resumen = {};
        datos.forEach(d => resumen[d.fecha] = (resumen[d.fecha] || 0) + d.cantidad);
        let txt = "RESUMEN POR DÍA:\n" + Object.keys(resumen).reverse().map(f => `${f}: $${resumen[f].toFixed(2)}`).join('\n');
        alert(txt || "Sin datos");
    }

    function limpiarHoy() {
        if (confirm("¿Reiniciar turno?")) {
            const hoy = new Date().toLocaleDateString('es-MX');
            let datos = JSON.parse(localStorage.getItem('foodlink_datos')) || [];
            localStorage.setItem('foodlink_datos', JSON.stringify(datos.filter(d => d.fecha !== hoy)));
            location.reload();
        }
    }
</script>
</body>
</html>
