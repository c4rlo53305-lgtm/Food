<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurador Pro GL</title>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .box { border: 2px dashed #334155; border-radius: 12px; height: 300px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #070b14; position: relative; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #334155; opacity: 0.7; }
        .status { margin-top: 15px; text-align: center; font-size: 13px; color: #94a3b8; min-height: 20px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--p); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0;">✨ Restaurador GL</h2>
    
    <div class="box" onclick="document.getElementById('fileIn').click()">
        <img id="imgOri" style="display:none">
        <p id="t1" style="text-align:center; padding:10px;">Toca para subir logo o foto</p>
        <input type="file" id="fileIn" hidden accept="image/*">
    </div>

    <div class="box">
        <img id="imgRes" style="display:none">
        <p id="t2">Resultado IA</p>
    </div>

    <button id="goBtn" class="btn">RESTAURAR AHORA</button>
    <div id="statusTxt" class="status">Listo</div>
</div>

<script>
    const KEY = "sk-cIrFsDjUshHs2sbzTty5ztSfvs6UIEcIS6Dy9sqCHTjqMbRb";

    const fileIn = document.getElementById('fileIn');
    const imgOri = document.getElementById('imgOri');
    const imgRes = document.getElementById('imgRes');
    const goBtn = document.getElementById('goBtn');
    const statusTxt = document.getElementById('statusTxt');

    fileIn.onchange = e => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = () => {
            imgOri.src = reader.result;
            imgOri.style.display = "block";
            document.getElementById('t1').style.display = "none";
            imgRes.style.display = "none";
            document.getElementById('t2').style.display = "block";
            statusTxt.innerText = "Imagen cargada.";
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function processImage(imgElement) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Forzamos a que no pase de 1024px para evitar el error de dimensiones
            let width = imgElement.naturalWidth;
            let height = imgElement.naturalHeight;
            const maxSide = 1024;

            if (width > height) {
                if (width > maxSide) {
                    height *= maxSide / width;
                    width = maxSide;
                }
            } else {
                if (height > maxSide) {
                    width *= maxSide / height;
                    height = maxSide;
                }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(imgElement, 0, 0, width, height);
            
            // Convertimos a Blob tipo PNG que es el que mejor acepta Stability
            canvas.toBlob(blob => resolve(blob), 'image/png');
        });
    }

    goBtn.onclick = async () => {
        if(!imgOri.src) return alert("Sube una foto primero");
        
        goBtn.disabled = true;
        statusTxt.innerHTML = '<div class="loader"></div> Procesando con Stability...';

        try {
            const imageBlob = await processImage(imgOri);
            const formData = new FormData();
            formData.append("image", imageBlob);
            formData.append("output_format", "webp");

            const response = await fetch("https://api.stability.ai/v2beta/stable-image/upscale/fast", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${KEY}`,
                    "Accept": "image/*" 
                },
                body: formData
            });

            if (response.status === 402) throw new Error("Sin créditos en la cuenta.");
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.errors ? errorData.errors[0] : "Reintenta en 5 segundos");
            }

            const resBlob = await response.blob();
            imgRes.src = URL.createObjectURL(resBlob);
            imgRes.style.display = "block";
            document.getElementById('t2').style.display = "none";
            statusTxt.innerText = "✅ ¡Restauración exitosa!";

        } catch (e) {
            statusTxt.innerText = "❌ " + e.message;
        } finally {
            goBtn.disabled = false;
        }
    };
</script>
</body>
</html>
